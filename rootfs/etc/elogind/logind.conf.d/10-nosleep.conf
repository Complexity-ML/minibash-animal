# minibash is a headless server we drive remotely -- it must never suspend on
# idle or sleep on a key/lid, or it drops off the network mid-session.
[Login]
IdleAction=ignore
HandlePowerKey=ignore
HandleSuspendKey=ignore
HandleHibernateKey=ignore
HandleLidSwitch=ignore
HandleLidSwitchExternalPower=ignore
HandleLidSwitchDocked=ignore
